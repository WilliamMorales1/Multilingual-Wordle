# fly.toml app configuration file generated for multilingual-wordle on 2026-06-17T05:39:47Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'multilingual-wordle'
primary_region = 'dfw'

[build]

[env]
  DATA_DIR = '/data'

[[mounts]]
  source = 'wordgo_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[metrics]]
  port = 8080
  path = '/metrics'
