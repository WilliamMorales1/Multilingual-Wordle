<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordgo: Multilingual Wordle</title>
  <link href="/frontend/style.css" rel="stylesheet" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#121213" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Wordgo" />
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-btns">
      <button class="icon-btn" id="clearCacheBtn" title="Clear Cache">
        <span class="icon icon-cache-clean"></span>
      </button>
    </div>
    <h1>Wordgo</h1>
    <div class="header-btns">
      <button class="icon-btn" id="statsBtn" title="Statistics">
        <span class="icon icon-stats"></span>
      </button>
      <button class="icon-btn" id="settingsBtn" title="New Game">
        <span class="icon icon-settings-sliders"></span>
      </button>
    </div>
  </header>

  <!-- Character-equivalence notice (shown after word list loads) -->
  <div id="equiv-notice" hidden>
    <span class="equiv-heading">Accents ignored:&nbsp;</span>
    <span id="equiv-list"></span>
    <button id="equiv-close" title="Dismiss">&times;</button>
  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- Board -->
  <div id="board-wrap">
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading word list&hellip;<br>This may take a minute for new languages.</p>
      <p id="loading-count"></p>
    </div>
    <div id="board"></div>
  </div>

  <!-- Keyboard -->
  <div id="keyboard"></div>

  <!-- Settings / New Game modal -->
  <div class="modal open" id="settingsModal">
    <div class="modal-box">
      <h2>New Game</h2>
      <div class="setting">
        <label for="langInput">Language</label>
        <div class="lang-dropdown">
          <input id="langInput" type="text" value="English" autocomplete="off" />
          <div id="langOptions" class="lang-options" hidden></div>
        </div>
      </div>
      <div class="setting">
        <label for="lengthInput">Word Length (2&ndash;20)</label>
        <input id="lengthInput" type="number" min="2" max="20" value="6" />
      </div>
      <div class="setting">
        <label for="guessesInput">Max Guesses (1&ndash;30)</label>
        <input id="guessesInput" type="number" min="1" max="30" value="6" />
      </div>
      <button class="btn-primary" id="startBtn">Start Game</button>
    </div>
  </div>

  <!-- Stats modal -->
  <div class="modal" id="statsModal">
    <div class="modal-box">
      <h2>Statistics</h2>
      <div class="stats-row">
        <div class="stat-box"><div class="num" id="stat-played">0</div><div class="lbl">Played</div></div>
        <div class="stat-box"><div class="num" id="stat-win-pct">0</div><div class="lbl">Win %</div></div>
        <div class="stat-box"><div class="num" id="stat-streak">0</div><div class="lbl">Streak</div></div>
        <div class="stat-box"><div class="num" id="stat-max-streak">0</div><div class="lbl">Best</div></div>
      </div>
      <div class="dist-section">
        <h3>Guess Distribution</h3>
        <div id="distContainer"></div>
      </div>
      <div id="definition">
        <div class="def-word" id="defWord"></div>
        <a class="def-wiktionary" id="defWiktionary" target="_blank" rel="noopener noreferrer">Wiktionary</a>
        <div class="def-text" id="defText"></div>
        <div class="def-etymology" id="defEtymology"></div>
      </div>
      <button class="btn-primary" id="shareBtn" hidden>Share</button>
      <button class="btn-primary" id="newGameFromStats">New Game</button>
      <button class="btn-secondary" id="closeStats">Close</button>
    </div>
  </div>

<script src="/frontend/script.js"></script>
</body>
</html>
